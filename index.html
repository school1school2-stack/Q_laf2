        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 25px; }
        .opt { padding: 20px; border: 2px solid #ecf0f1; border-radius: 12px; cursor: pointer; text-align: center; font-size: 1.3rem; background: #fff; transition: 0.2s; color: #34495e; font-weight: 600; }
        .opt:hover { border-color: var(--main-color); background: #f9fbfb; }
        .correct { background: var(--correct) !important; color: white !important; border-color: var(--correct) !important; }
        .wrong { background: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; }
        .btn { background: var(--main-color); color: white; padding: 15px 55px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: bold; display: inline-block; text-decoration: none; transition: 0.3s; }

    // --- 6. الارتباط والاختلاف (6 أسئلة) ---
    { t: "الارتباط والاختلاف", q: "الارتباط الأقوى لـ (مؤذن) هو:", opts: ["مسجد", "بيت", "سوق", "شارع"], ans: "مسجد" },
    { t: "الارتباط والاختلاف", q: "الارتباط الأقوى لـ (نوافذ) هو:", opts: ["غرفة", "كتاب", "طائرة", "قلم"], ans: "غرفة" },
    { t: "الارتباط والاختلاف", q: "ما الكلمة التي لا تنتمي لمجموعة (أدوات الكتابة):", opts: ["قلم", "ورقة", "ممحاة", "ملعقة"], ans: "ملعقة" },
    { t: "الارتباط والاختلاف", q: "الارتباط الأقوى لـ (رؤية السعودية) هو:", opts: ["الاستدامة", "التراجع", "الإهمال", "الماضي"], ans: "الاستدامة" },
    { t: "الارتباط والاختلاف", q: "ما الكلمة المرتبطة بـ (فلك):", opts: ["مجرة", "مزرعة", "سيارة", "ملعب"], ans: "مجرة" },
    { t: "الارتباط والاختلاف", q: "الارتباط الأقوى لـ (العلم) هو:", opts: ["النور", "الظلام", "المال", "القوة"], ans: "النور" }
];
    const currentModelId = "نموذج - 4";
    let sName, sEmail, currentIdx = 0, userScore = 0, timer, finalQuestions, studentAnswers = [];

    async function verifyAndStart() {
        const emailInput = document.getElementById('studentEmail').value.trim().toLowerCase();
        if(!emailInput.includes('@')) return alert("يرجى إدخال إيميل منصة مدرستي");
        document.getElementById('status-msg').innerText = "جاري التحقق... ⏳";
        try {
            const allowedDoc = await db.collection("allowed_students").doc(emailInput).get();
            if (!allowedDoc.exists) { showLock("هذا الإيميل غير مسجل. يرجى مراجعة المعلم."); return; }
            sName = allowedDoc.data().name; sEmail = emailInput;
            const resultCheck = await db.collection("student_results").where("email", "==", sEmail).where("model_id", "==", currentModelId).get();
            if (!resultCheck.empty) { showLock(`عذراً يا ${sName}، لقد سبق لك خوض هذا الاختبار. استمر في التألق!`); return; }
            document.getElementById('challenger-display').innerText = `المتحدي: ${sName}`;
            finalQuestions = [...rawQuizData].sort(() => Math.random() - 0.5);
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('quiz-page').classList.remove('hidden');
            loadQuestion();
        } catch (e) { alert("خطأ في الاتصال بالسيرفر."); }
    }

    function showLock(msg) {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('lock-screen').classList.remove('hidden');
        document.getElementById('lock-message').innerText = msg;
    }

    function loadQuestion() {
        if(currentIdx >= finalQuestions.length) return finish();
        const data = finalQuestions[currentIdx];
        document.getElementById('q-counter').innerText = `سؤال ${currentIdx+1} من ${finalQuestions.length}`;
        document.getElementById('q-type-label').innerText = data.t;
        document.getElementById('question-text').innerHTML = data.q;
        document.getElementById('next-btn').classList.add('hidden');
        const box = document.getElementById('options-area'); box.innerHTML = '';
        [...data.opts].sort(() => Math.random() - 0.5).forEach(o => {
            const d = document.createElement('div'); d.className = 'opt'; d.innerText = o;
            d.onclick = () => {
                clearInterval(timer);
                const isCorrect = (o === data.ans); if(isCorrect) userScore++;
                studentAnswers.push({ qText: data.q, studentAns: o, correctAns: data.ans, isCorrect: isCorrect, type: data.t });
                document.querySelectorAll('.opt').forEach(el => {
                    el.onclick = null;
                    if(el.innerText === data.ans) el.classList.add('correct');
                    else if(el.innerText === o) el.classList.add('wrong');
                });
                document.getElementById('next-btn').classList.remove('hidden');
            };
            box.appendChild(d);
        });
        startTimer();
    }

    function startTimer() {
        let s = 45; document.getElementById('timer').innerText = s;
        clearInterval(timer);
        timer = setInterval(() => {
            s--; document.getElementById('timer').innerText = s;
            if(s<=0) { clearInterval(timer); nextQuestion(); }
        }, 1000);
    }

    function nextQuestion() { currentIdx++; loadQuestion(); }

    async function finish() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');
        
                const sections = { tan: 0, ekm: 0, syq: 0, st: 0, mfr: 0, art: 0, ikh: 0 };
        const map = { 
            "التناظر اللفظي": "tan", 
            "إكمال الجمل": "ekm", 
            "الخطأ السياقي": "syq", 
            "استيعاب المقروء": "st", 
            "المفردة الشاذة": "mfr", 
            "الارتباط والاختلاف": "art" 
        };

        Object.keys(map).forEach(key => {
            const qInType = studentAnswers.filter(a => a.type === key);
            if(qInType.length > 0) {
                const correct = qInType.filter(a => a.isCorrect).length;
                const percent = Math.round((correct / qInType.length) * 100);
                
                if (map[key] === "art") {
                    sections.art = percent; 
                    sections.ikh = percent; 
                } else {
                    sections[map[key]] = percent;
                }
            }
        });

        await db.collection("student_results").add({ 
            name: sName, 
            email: sEmail, 
            score: userScore, 
            total: finalQuestions.length, 
            model_id: currentModelId, 
            sections: sections, 
            answers: studentAnswers,
            time: firebase.firestore.FieldValue.serverTimestamp() 
        });

        document.getElementById('final-greeting').innerHTML = `جهدك اليوم محل تقدير يا (${sName}) 💐<br>بإصرار وعزيمة ستصل لمستوى أعلى!`;
        document.getElementById('score-text').innerText = `${userScore} / ${finalQuestions.length}`;

    }
</script>
